
name: CI/CD Pipeline - University Notice Board

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Quality (HTMLHint + Stylelint)
  # ─────────────────────────────────────────────
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Step 2 - Run HTMLHint
        run: npx htmlhint "src/**/*.html"

      - name: 🎨 Step 3 - Run Stylelint
        run: npx stylelint "styles/**/*.css"

  # ─────────────────────────────────────────────
  # JOB 2: Build (Parcel)
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build Website
    runs-on: ubuntu-latest
    needs: code-quality      # Only runs if code-quality passes

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ⚙️ Step 4 - Build with Parcel
        run: npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push
  # ─────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build             # Only runs if build passes

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/uni-notice-board
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: 🔨 Step 5 - Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: 🚀 Step 6 - Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          